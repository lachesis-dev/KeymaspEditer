# ============================================================
# config/totem.conf
# 左右共通の Kconfig 設定
# ============================================================

# ---------- Split / BLE ----------
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# 接続数:
#   左Central直結: Central(左) 1台 + Peripheral(右) 1台 + ホスト 1台 = 3
#   ドングル構成時は 5 に増やすこと
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

# ---------- XIAO nRF52840 固有 ----------
# バッテリー電圧 ADC 読み取りを有効化
# CONFIG_ZMK_BATTERY_REPORTING は CONFIG_ZMK_BLE が有効なら自動で有効になる
CONFIG_ZMK_BATTERY_REPORTING=y
# バッテリーレベル通知間隔 (秒)。デフォルト 60 のため明示指定は任意
# CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# Split キーボードで右半分 (Peripheral) のバッテリー残量も取得する
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ---------- Bluetooth 安定性 ----------
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ---------- USB ログ (デバッグ時のみ有効にする) ----------
# CONFIG_ZMK_USB_LOGGING=y

# ---------- スリープ ----------
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ============================================================
# ドングル構成に変更する場合の差分メモ:
#   CONFIG_BT_MAX_CONN=5
#   CONFIG_BT_MAX_PAIRED=5
# ============================================================
